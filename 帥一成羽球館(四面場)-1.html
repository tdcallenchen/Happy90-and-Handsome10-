<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>帥一成羽球館｜場上大螢幕</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #020617;
      --surface: #1e293b;
      --border: #334155;
      --male: #1e3a8a;
      --male-border: #3b82f6;
      --male-text: #bfdbfe;
      --female: #831843;
      --female-border: #f472b6;
      --female-text: #fbcfe8;
      --court-bg: #064e3b;
      --court-border: #10b981;
      --court-accent: #34d399;
      --text: #f8fafc;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      background: var(--bg);
    }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
      padding: 1.5vh 1.5vw;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 7vh;
      margin-bottom: 1vh;
    }
    .brand {
      font-size: 3.8vh;
      font-weight: 900;
      letter-spacing: 0.1em;
    }
    .brand em { color: #60a5fa; font-style: normal; }
    .clock {
      font-size: 3.2vh;
      font-weight: 700;
      color: #94a3b8;
      font-variant-numeric: tabular-nums;
    }

    /* ── MAIN AREA ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .section-label {
      font-size: 2.2vh;
      font-weight: 800;
      letter-spacing: 0.3em;
      color: var(--court-accent);
      margin-bottom: 1vh;
    }

    .four-col {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.5vw;
      flex: 1;
      min-height: 0;
    }

    /* ── COURT CARD ── */
    .zone {
      border-radius: 20px;
      padding: 1.2vh;
      display: flex;
      flex-direction: column;
      background: var(--court-bg);
      border: 3px solid var(--court-border);
      height: 100%;
      min-height: 0;
    }

    .zone-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 6vh;
      border-bottom: 2px solid rgba(255,255,255,0.1);
      margin-bottom: 1vh;
    }

    .zone-name {
      font-size: 3vh;
      font-weight: 900;
      color: var(--court-accent);
    }

    .zone-badge {
      font-size: 2.2vh;
      font-weight: 800;
      background: rgba(0,0,0,0.3);
      padding: 2px 14px;
      border-radius: 8px;
      border: 1.5px solid var(--court-border);
      color: var(--court-accent);
    }

    .player-list {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1vh;
      min-height: 0;
    }

    /* ── PLAYER CHIP (加大字體版) ── */
    .player {
      flex: 1; 
      border-radius: 12px;
      padding: 0 1.5vw;
      /* 加大字體至 4.5vh，並加粗 */
      font-size: 4.5vh; 
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 2px solid transparent;
      min-height: 0;
      overflow: hidden;
      /* 增加文字陰影，提升大螢幕對比度 */
      text-shadow: 0 3px 6px rgba(0,0,0,0.4);
    }

    .player.male {
      background: linear-gradient(135deg, var(--male) 0%, #1e40af 100%);
      border-color: var(--male-border);
      color: var(--male-text);
    }

    .player.female {
      background: linear-gradient(135deg, var(--female) 0%, #9d174d 100%);
      border-color: var(--female-border);
      color: var(--female-text);
    }

    .player .gtag {
      font-size: 2vh;
      opacity: 0.9;
      background: rgba(0,0,0,0.3);
      padding: 2px 12px;
      border-radius: 6px;
      font-weight: 700;
    }

    /* 缺人閃爍動畫 */
    .zone.empty { animation: pulse 2s infinite; }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0px rgba(16, 185, 129, 0.4); }
      70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); }
      100% { box-shadow: 0 0 0 0px rgba(16, 185, 129, 0); }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="brand">🏸 帥一成 <em>羽球館</em></div>
  <div class="clock" id="clock">--:--:--</div>
</div>

<div class="main">
  <div class="section-label">🟢 ON COURT｜場上名單</div>
  <div class="four-col">
    <div class="zone" id="zone-court1">
      <div class="zone-header"><span class="zone-name">1 號場</span><span class="zone-badge" id="cnt-court1">0</span></div>
      <div class="player-list" id="court1"></div>
    </div>
    <div class="zone" id="zone-court2">
      <div class="zone-header"><span class="zone-name">2 號場</span><span class="zone-badge" id="cnt-court2">0</span></div>
      <div class="player-list" id="court2"></div>
    </div>
    <div class="zone" id="zone-court3">
      <div class="zone-header"><span class="zone-name">3 號場</span><span class="zone-badge" id="cnt-court3">0</span></div>
      <div class="player-list" id="court3"></div>
    </div>
    <div class="zone" id="zone-court4">
      <div class="zone-header"><span class="zone-name">4 號場</span><span class="zone-badge" id="cnt-court4">0</span></div>
      <div class="player-list" id="court4"></div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA-n5j37dvvgvdmosJNg622XAXZp5WovW8",
    authDomain: "havix-for-customers.firebaseapp.com",
    projectId: "havix-for-customers",
    databaseURL: "https://havix-for-customers-default-rtdb.firebaseio.com",
    storageBucket: "havix-for-customers.firebasestorage.app",
    messagingSenderId: "876660373844",
    appId: "1:876660373844:web:fb1358967daf203589b0c1"
  };

  // 初始化 Firebase
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const courtIds = ['court1', 'court2', 'court3', 'court4'];

  function makePlayerEl(p) {
    const div = document.createElement('div');
    div.className = `player ${p.g === 'M' ? 'male' : 'female'}`;
    div.innerHTML = `<span>${p.n}</span><span class="gtag">${p.g === 'M' ? '男' : '女'}</span>`;
    return div;
  }

  // 監聽資料庫
  onValue(ref(db, 'simple_queue'), (snap) => {
    const data = snap.val() || {};
    courtIds.forEach(id => {
      const el = document.getElementById(id);
      const badge = document.getElementById('cnt-' + id);
      const zone = document.getElementById('zone-' + id);
      if (!el) return;
      el.innerHTML = '';
      
      const players = (data[id] || []).slice(0, 4);
      players.forEach(p => el.appendChild(makePlayerEl(p)));
      
      if (badge) badge.textContent = players.length;
      
      // 不足 4 人閃爍
      if (players.length > 0 && players.length < 4) {
        zone.classList.add('empty');
      } else {
        zone.classList.remove('empty');
      }
    });
  }, (error) => {
    console.error("Firebase 連線失敗:", error);
  });

  // 時鐘
  function tick() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleTimeString('zh-TW', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }
  tick(); setInterval(tick, 1000);

  // 點擊觸發全螢幕與常亮
  document.body.addEventListener('click', async () => {
    if (!document.fullscreenElement) {
      await document.documentElement.requestFullscreen().catch(() => {});
    }
    if ('wakeLock' in navigator) {
      try { await navigator.wakeLock.request('screen'); } catch (err) {}
    }
  });
</script>

</body>
</html>

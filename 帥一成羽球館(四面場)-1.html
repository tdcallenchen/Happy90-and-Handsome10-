<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>帥一成羽球館｜大螢幕</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --border: #334155;

    --male: #1e3a5f;
    --male-border: #3b82f6;
    --male-text: #93c5fd;

    --female: #5f1e3a;
    --female-border: #f472b6;
    --female-text: #fbcfe8;

    --court-bg: #052e16;
    --court-border: #22c55e;
    --court-accent: #4ade80;

    --wait-bg: #1c1007;
    --wait-border: #f97316;
    --wait-accent: #fb923c;

    --bench-bg: #0f1e3a;
    --bench-border: #3b5bdb;
    --bench-accent: #818cf8;

    --text: #f1f5f9;
    --text2: #94a3b8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 16px;
    gap: 16px;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 4px;
  }
  .brand {
    font-size: 1.6rem;
    font-weight: 900;
    color: var(--text);
    letter-spacing: 0.04em;
  }
  .brand em { color: #60a5fa; font-style: normal; }
  .clock {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--text2);
    font-variant-numeric: tabular-nums;
  }

  /* ── MAIN GRID ── */
  .main {
    display: grid;
    grid-template-columns: 180px 1fr;
    gap: 16px;
    flex: 1;
  }

  /* ── BENCH COLUMN ── */
  .bench-col {
    background: var(--bench-bg);
    border: 1.5px solid var(--bench-border);
    border-radius: 16px;
    padding: 14px 10px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .col-label {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--bench-accent);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .col-label .cnt {
    margin-left: auto;
    font-size: 11px;
    background: #1e2d5a;
    border-radius: 8px;
    padding: 1px 8px;
    color: var(--bench-accent);
    font-weight: 700;
  }
  .bench-list {
    display: flex;
    flex-direction: column;
    gap: 5px;
    overflow-y: auto;
  }

  /* ── RIGHT AREA ── */
  .right-area {
    display: grid;
    grid-template-rows: 1fr 1fr;
    gap: 16px;
  }

  /* ── SECTION ── */
  .section {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .section-label {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding-left: 2px;
  }
  .section-label.green  { color: var(--court-accent); }
  .section-label.orange { color: var(--wait-accent); }

  .four-col {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    flex: 1;
  }

  /* ── ZONE CARD ── */
  .zone {
    border-radius: 16px;
    padding: 12px 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    border: 1.5px solid var(--border);
    background: var(--surface);
  }
  .zone.court { background: var(--court-bg); border-color: var(--court-border); }
  .zone.wait  { background: var(--wait-bg);  border-color: var(--wait-border); }

  .zone-header {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 2px;
  }
  .zone-name {
    font-size: 13px;
    font-weight: 900;
    letter-spacing: 0.06em;
    flex: 1;
  }
  .zone.court .zone-name { color: var(--court-accent); }
  .zone.wait  .zone-name { color: var(--wait-accent); }

  .zone-badge {
    font-size: 11px;
    font-weight: 700;
    border-radius: 9px;
    padding: 1px 8px;
    border: 1px solid;
  }
  .zone.court .zone-badge { background: #052e16; border-color: var(--court-border); color: var(--court-accent); }
  .zone.wait  .zone-badge { background: #1c1007; border-color: var(--wait-border);  color: var(--wait-accent); }

  .player-list {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  /* ── PLAYER CHIP ── */
  .player {
    border-radius: 9px;
    padding: 8px 12px;
    font-size: 15px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border: 1.5px solid transparent;
  }
  .player.male   { background: var(--male);   border-color: var(--male-border);   color: var(--male-text); }
  .player.female { background: var(--female); border-color: var(--female-border); color: var(--female-text); }
  .player .gtag  { font-size: 10px; opacity: 0.5; font-weight: 500; }

  /* Bench chips are smaller */
  .bench-list .player {
    font-size: 13px;
    padding: 6px 10px;
  }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div class="header">
  <div class="brand">🏸 帥一成 <em>羽球館</em></div>
  <div class="clock" id="clock">--:--:--</div>
</div>

<div class="main">

  <!-- BENCH -->
  <div class="bench-col">
    <div class="col-label">
      ⏸ 休息區
      <span class="cnt" id="cnt-bench">0</span>
    </div>
    <div class="bench-list" id="bench"></div>
  </div>

  <!-- COURTS + WAIT -->
  <div class="right-area">

    <div class="section">
      <div class="section-label green">🟢 上場區</div>
      <div class="four-col">
        <div class="zone court">
          <div class="zone-header">
            <span class="zone-name">1 號場</span>
            <span class="zone-badge" id="cnt-court1">0</span>
          </div>
          <div class="player-list" id="court1"></div>
        </div>
        <div class="zone court">
          <div class="zone-header">
            <span class="zone-name">2 號場</span>
            <span class="zone-badge" id="cnt-court2">0</span>
          </div>
          <div class="player-list" id="court2"></div>
        </div>
        <div class="zone court">
          <div class="zone-header">
            <span class="zone-name">3 號場</span>
            <span class="zone-badge" id="cnt-court3">0</span>
          </div>
          <div class="player-list" id="court3"></div>
        </div>
        <div class="zone court">
          <div class="zone-header">
            <span class="zone-name">4 號場</span>
            <span class="zone-badge" id="cnt-court4">0</span>
          </div>
          <div class="player-list" id="court4"></div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-label orange">⏳ 等待區</div>
      <div class="four-col">
        <div class="zone wait">
          <div class="zone-header">
            <span class="zone-name">等待 A</span>
            <span class="zone-badge" id="cnt-waitA">0</span>
          </div>
          <div class="player-list" id="waitA"></div>
        </div>
        <div class="zone wait">
          <div class="zone-header">
            <span class="zone-name">等待 B</span>
            <span class="zone-badge" id="cnt-waitB">0</span>
          </div>
          <div class="player-list" id="waitB"></div>
        </div>
        <div class="zone wait">
          <div class="zone-header">
            <span class="zone-name">等待 C</span>
            <span class="zone-badge" id="cnt-waitC">0</span>
          </div>
          <div class="player-list" id="waitC"></div>
        </div>
        <div class="zone wait">
          <div class="zone-header">
            <span class="zone-name">等待 D</span>
            <span class="zone-badge" id="cnt-waitD">0</span>
          </div>
          <div class="player-list" id="waitD"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA-n5j37dvvgvdmosJNg622XAXZp5WovW8",
    authDomain: "havix-for-customers.firebaseapp.com",
    projectId: "havix-for-customers",
    databaseURL: "https://havix-for-customers-default-rtdb.firebaseio.com",
    storageBucket: "havix-for-customers.firebasestorage.app",
    messagingSenderId: "876660373844",
    appId: "1:876660373844:web:fb1358967daf203589b0c1"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const zones = ['bench','court1','court2','court3','court4','waitA','waitB','waitC','waitD'];

  function makePlayerEl(p) {
    const div = document.createElement('div');
    div.className = `player ${p.g === 'M' ? 'male' : 'female'}`;
    div.innerHTML = `<span>${p.n}</span><span class="gtag">${p.g === 'M' ? '♂' : '♀'}</span>`;
    return div;
  }

  onValue(ref(db, 'simple_queue'), (snap) => {
    const data = snap.val() || {};
    zones.forEach(id => {
      const el = document.getElementById(id);
      const badge = document.getElementById('cnt-' + id);
      if (!el) return;
      el.innerHTML = '';
      (data[id] || []).forEach(p => el.appendChild(makePlayerEl(p)));
      if (badge) badge.textContent = el.children.length;
    });
  });

  // 時鐘
  function tick() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleTimeString('zh-TW', { hour12: false });
  }
  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>

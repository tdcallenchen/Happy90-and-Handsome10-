<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>帥一成羽球館｜大螢幕版</title>
    <style>
        :root {
            --bg: #0f172a; 
            --panel-bg: #1e293b; 
            --accent: #ef4444; 
            --male: #3b82f6; 
            --female: #ec4899; 
            --winner: #22c55e; 
            --border-radius: 20px;
        }

        html, body { 
            margin: 0; padding: 0; 
            background: var(--bg); 
            font-family: 'Noto Sans TC', sans-serif; 
            height: 100vh; 
            color: #f1f5f9; 
            overflow: hidden; 
        }
        body { display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }

        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        h1 { margin: 0; font-size: 3rem; font-weight: 900; color: var(--accent); text-shadow: 3px 3px 6px rgba(0,0,0,0.5); }

        #controls { display: flex; gap: 15px; margin-bottom: 20px; }
        #adminControls { display: none; position: absolute; top: 100px; left: 20px; background: var(--panel-bg); padding: 20px; border-radius: var(--border-radius); border: 2px solid var(--accent); z-index: 5000; flex-direction: column; gap: 10px; }
        input, select, button { padding: 12px 20px; border-radius: 12px; border: none; font-size: 1.2rem; font-weight: bold; }
        input, select { background: #334155; color: white; border: 1px solid #475569; }
        button { background: var(--accent); color: white; cursor: pointer; }

        .container { 
            display: grid; 
            grid-template-columns: 320px 1fr; 
            gap: 25px; 
            flex-grow: 1; 
            min-height: 0; 
        }

        .right-side { display: grid; grid-template-rows: 1fr 1fr; gap: 25px; min-height: 0; }

        .area { 
            background: var(--panel-bg); 
            border-radius: var(--border-radius); 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            border: 2px solid #334155;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
        .area h3 { 
            text-align: center; color: #94a3b8; 
            margin: 0 0 12px 0; font-size: 1.8rem; 
            border-bottom: 3px solid #334155; padding-bottom: 10px; 
        }

        .courts, .waiting { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 20px; 
        }

        .player-zone { flex-grow: 1; display: flex; flex-direction: column; gap: 10px; min-height: 50px; }
        .player { 
            width: 100%; 
            height: 75px; 
            border-radius: 15px; 
            font-weight: 900; 
            font-size: 2.2rem; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: #000; 
            position: relative; 
            border: 4px solid transparent;
            transition: all 0.2s;
        }
        
        .player.male { background: linear-gradient(180deg, #93c5fd, var(--male)); }
        .player.female { background: linear-gradient(180deg, #fbcfe8, var(--female)); }
        .player.winner { border-color: #22c55e !important; box-shadow: 0 0 25px rgba(34, 197, 94, 0.8); transform: scale(1.02); }
        .win-rate { position: absolute; bottom: 4px; right: 8px; font-size: 0.9rem; color: rgba(0,0,0,0.6); }

        .end-btn { margin-top: 10px; background: #475569; color: #fff; padding: 8px; border-radius: 12px; font-size: 1.1rem; border: none; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; max-width: 800px; background: #1e293b; border-radius: 24px; padding: 40px; border: 2px solid var(--accent); z-index: 9999; }

        @media (max-width: 800px) {
            body { overflow-y: auto; height: auto; }
            .container { grid-template-columns: 1fr; }
            .courts, .waiting { grid-template-columns: repeat(2, 1fr); }
            .player { height: 60px; font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="header-top">
        <h1 id="mainTitle">🏸 帥一成羽球館</h1>
        <div id="controls">
            <input type="text" id="newPlayer" placeholder="輸入姓名" style="width: 150px;">
            <select id="gender"><option value="M">男 ♂</option><option value="F">女 ♀</option></select>
            <button onclick="addPlayer()">＋ 新增球員</button>
            <button id="delBtn" onclick="toggleDeleteMode()" style="background:#475569;">🗑️ 刪除模式</button>
        </div>
    </div>

    <div id="adminControls">
        <button onclick="exportToCSV()" style="background:#22c55e">📥 匯出報表</button>
        <button id="showRankBtn" style="background:#3b82f6">🏆 歷史排行榜</button>
        <button id="showLogBtn" style="background:#3b82f6">📋 今日對戰紀錄</button>
        <button onclick="resetToday()" style="background:#f59e0b">🔄 重置今日紀錄</button>
        <button onclick="resetEverything()" style="background:#ef4444">⚠️ 重置所有資料</button>
    </div>

    <div class="container">
        <div class="area" id="bench">
            <h3>休息區 (Bench)</h3>
            <div class="player-zone" id="bench-zone"></div>
        </div>

        <div class="right-side">
            <div class="courts">
                <div class="area" id="court1"><h3>1 號場</h3><div class="player-zone" id="court1-zone"></div><button class="end-btn" onclick="endMatch('court1')">結束比賽</button></div>
                <div class="area" id="court2"><h3>2 號場</h3><div class="player-zone" id="court2-zone"></div><button class="end-btn" onclick="endMatch('court2')">結束比賽</button></div>
                <div class="area" id="court3"><h3>3 號場</h3><div class="player-zone" id="court3-zone"></div><button class="end-btn" onclick="endMatch('court3')">結束比賽</button></div>
                <div class="area" id="court4"><h3>4 號場</h3><div class="player-zone" id="court4-zone"></div><button class="end-btn" onclick="endMatch('court4')">結束比賽</button></div>
            </div>

            <div class="waiting">
                <div class="area" id="waitingA"><h3>等待 1</h3><div class="player-zone" id="waitingA-zone"></div></div>
                <div class="area" id="waitingB"><h3>等待 2</h3><div class="player-zone" id="waitingB-zone"></div></div>
                <div class="area" id="waitingC"><h3>等待 3</h3><div class="player-zone" id="waitingC-zone"></div></div>
                <div class="area" id="waitingD"><h3>等待 4</h3><div class="player-zone" id="waitingD-zone"></div></div>
            </div>
        </div>
    </div>

    <div id="rankModal" class="modal"><h3>🏆 歷史排行榜</h3><div id="rankContent" style="max-height: 50vh; overflow: auto; font-size: 1.5rem;"></div><button onclick="this.parentElement.style.display='none'" style="width:100%; margin-top:20px; background:#444;">關閉</button></div>
    <div id="logModal" class="modal"><h3>📋 今日對戰紀錄</h3><div id="logContent" style="max-height: 50vh; overflow: auto; font-size: 1.2rem;"></div><button onclick="this.parentElement.style.display='none'" style="width:100%; margin-top:20px; background:#444;">關閉</button></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
        import Sortable from "https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/+esm";

        // 已更換為您提供的第一個檔案中的 Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyA-n5j37dvvgvdmosJNg622XAXZp5WovW8",
            authDomain: "havix-for-customers.firebaseapp.com",
            projectId: "havix-for-customers",
            databaseURL: "https://havix-for-customers-default-rtdb.firebaseio.com",
            storageBucket: "havix-for-customers.firebasestorage.app",
            messagingSenderId: "876660373844",
            appId: "1:876660373844:web:fb1358967daf203589b0c1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const allZones = ['bench-zone', 'court1-zone', 'court2-zone', 'court3-zone', 'court4-zone', 'waitingA-zone', 'waitingB-zone', 'waitingC-zone', 'waitingD-zone'];
        const waitZones = ['waitingA-zone', 'waitingB-zone', 'waitingC-zone', 'waitingD-zone'];
        let isLocalMoving = false, isDeleteMode = false, todayStats = {}, historyStats = {}, logs = [];

        onValue(ref(db, 'today_stats'), (s) => { todayStats = s.val() || {}; refreshWinRates(); });
        onValue(ref(db, 'history_stats'), (s) => { historyStats = s.val() || {}; });
        onValue(ref(db, 'match_logs'), (s) => { logs = Object.values(s.val() || {}).reverse(); });

        allZones.forEach(id => {
            onValue(ref(db, id), (snapshot) => {
                if (isLocalMoving) return;
                const zone = document.getElementById(id); if(!zone) return;
                zone.innerHTML = '';
                (snapshot.val()?.players || []).forEach(p => zone.appendChild(createPlayerDOM(p.name, p.gender)));
            });
            Sortable.create(document.getElementById(id), { group: 'players', animation: 150, onStart: () => isLocalMoving = true, onMove: (evt) => { if (evt.to.id !== 'bench-zone' && evt.to.children.length >= 4) return false; }, onEnd: () => { isLocalMoving = false; syncToDB(); } });
        });

        function createPlayerDOM(name, gender) {
            const div = document.createElement('div');
            div.className = `player ${gender === 'M' ? 'male' : 'female'}`;
            div.dataset.name = name; div.dataset.gender = gender;
            const s = todayStats[name] || { wins: 0, total: 0 };
            div.innerHTML = `<span>${name}</span><span class="win-rate">${s.total ? Math.round((s.wins/s.total)*100) : 0}%</span>`;
            div.onclick = () => { if(isDeleteMode) { if(confirm(`移除 ${name}？`)) { div.remove(); syncToDB(); } } else if(div.parentElement.id.includes('court')) div.classList.toggle('winner'); };
            return div;
        }

        function syncToDB() {
            allZones.forEach(id => {
                const zone = document.getElementById(id);
                const players = [...zone.querySelectorAll('.player')].map(p => ({ name: p.dataset.name, gender: p.dataset.gender }));
                set(ref(db, id), { players });
            });
            set(ref(db, 'today_stats'), todayStats);
        }

        window.endMatch = function(courtId) {
            const courtZone = document.getElementById(courtId + '-zone');
            const players = [...courtZone.querySelectorAll('.player')];
            if(players.length === 0) return;
            const winners = players.filter(p => p.classList.contains('winner')).map(p => p.dataset.name);
            const losers = players.filter(p => !p.classList.contains('winner')).map(p => p.dataset.name);
            players.forEach(p => {
                const name = p.dataset.name;
                if(!todayStats[name]) todayStats[name] = { wins: 0, total: 0 };
                if(!historyStats[name]) historyStats[name] = { wins: 0, total: 0, gender: p.dataset.gender };
                todayStats[name].total++; historyStats[name].total++;
                if(winners.includes(name)) { todayStats[name].wins++; historyStats[name].wins++; }
                document.getElementById('bench-zone').appendChild(p); p.classList.remove('winner');
            });
            if(winners.length > 0) push(ref(db, 'match_logs'), { time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), winners: winners.join(', '), losers: losers.join(', ') });
            const waitA = document.getElementById('waitingA-zone');
            while (courtZone.children.length < 4 && waitA.children.length > 0) courtZone.appendChild(waitA.children[0]);
            for (let i = 0; i < waitZones.length - 1; i++) {
                const curr = document.getElementById(waitZones[i]); const next = document.getElementById(waitZones[i+1]);
                while (curr.children.length < 4 && next.children.length > 0) curr.appendChild(next.children[0]);
            }
            syncToDB(); set(ref(db, 'history_stats'), historyStats);
        };

        window.addPlayer = function() { const name = document.getElementById('newPlayer').value.trim(); const gender = document.getElementById('gender').value; if(!name) return; document.getElementById('bench-zone').appendChild(createPlayerDOM(name, gender)); document.getElementById('newPlayer').value = ''; syncToDB(); };
        window.toggleDeleteMode = function() { isDeleteMode = !isDeleteMode; document.getElementById('delBtn').style.background = isDeleteMode ? "#000" : "#475569"; };
        window.resetToday = function() { if(confirm('確定要清空今日進度？')) { set(ref(db,'today_stats'),{}); set(ref(db,'match_logs'),{}); allZones.forEach(id=>set(ref(db,id),{players:[]})); } };
        window.resetEverything = function() { const pw = prompt("請輸入重置密碼："); if(pw==="60540391") remove(ref(db,'/')).then(()=>location.reload()); };
        window.deleteFromHistory = function(name) { const pw = prompt(`永久刪除 ${name}？`); if(pw === "60540391") { delete historyStats[name]; set(ref(db, 'history_stats'), historyStats).then(() => document.getElementById('showRankBtn').click()); } };
        window.exportToCSV = function() { if (logs.length === 0) return alert("尚無紀錄"); let csvContent = "\uFEFF時間,勝隊,敗隊\n"; logs.forEach(l => { csvContent += `${l.time},"${l.winners}","${l.losers}"\n`; }); const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' }); const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = `羽球戰報.csv`; link.click(); };

        document.getElementById('mainTitle').onclick = (function() { let count = 0, timer; return function() { count++; if(count >= 3) { const admin = document.getElementById('adminControls'); admin.style.display = (admin.style.display === 'flex') ? 'none' : 'flex'; count = 0; } clearTimeout(timer); timer = setTimeout(() => count = 0, 1500); }; })();
        document.getElementById('showLogBtn').onclick = () => { document.getElementById('logContent').innerHTML = logs.map(l => `<div style="padding:15px; border-bottom:1px solid #334155;"><b>[${l.time}]</b><br><span style="color:#4ade80;">勝：${l.winners}</span><br><span style="color:#f87171;">敗：${l.losers}</span></div>`).join('') || '尚無紀錄'; document.getElementById('logModal').style.display = 'block'; };
        document.getElementById('showRankBtn').onclick = () => {
            const all = Object.entries(historyStats).map(([name, s]) => ({ name, ...s, rate: s.total ? Math.round((s.wins/s.total)*100) : 0 }));
            const buildRank = (players, title) => {
                const sorted = players.sort((a,b)=>(b.wins-a.wins)||(b.rate-a.rate));
                let html = `<div style="background:#334155;padding:15px;margin-top:10px;border-radius:15px;font-weight:bold;">${title}</div><table style="width:100%; text-align:left; color:#fff; border-collapse:collapse; margin-top:10px;">`;
                sorted.forEach((p, index) => { html += `<tr style="border-bottom:1px solid #475569;"><td style="padding:10px;">${index+1}</td><td style="padding:10px;">${p.name}</td><td style="padding:10px;">${p.wins}勝</td><td style="padding:10px;">${p.rate}%</td><td><button onclick="deleteFromHistory('${p.name}')" style="background:none;color:#ef4444;font-size:1.5rem;">🗑️</button></td></tr>`; });
                return html + `</table>`;
            };
            document.getElementById('rankContent').innerHTML = buildRank(all.filter(p=>p.gender==='M'), '🏆 男子排行榜') + buildRank(all.filter(p=>p.gender==='F'), '🌸 女子排行榜'); document.getElementById('rankModal').style.display = 'block';
        };
        function refreshWinRates() { document.querySelectorAll('.player').forEach(p => { const s = todayStats[p.dataset.name] || { wins: 0, total: 0 }; const rs = p.querySelector('.win-rate'); if(rs) rs.textContent = `${s.total ? Math.round((s.wins/s.total)*100) : 0}%`; }); }
    </script>
</body>
</html>
